<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account — Loiter Point</title>
<meta name="description" content="Sign in to your Loiter Point account.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://loiterpoint.com/account.html">
<link rel="icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&amp;family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--bg: #0c0c0e; --surface: #141418; --surface2: #1c1c22;
--accent: #e8ff47; --accent2: #ff6b35;
--text: #e2e2e8; --muted: #7a7a8a; --border: #26262e;
--radius: 10px; --mono: 'IBM Plex Mono', monospace;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: inherit; text-decoration: none; }

nav {
display: flex; align-items: center; justify-content: space-between;
padding: 1rem 2rem; border-bottom: 1px solid var(--border);
position: sticky; top: 0; background: rgba(12,12,14,0.97);
backdrop-filter: blur(12px); z-index: 100;
}
.nav-logo { display: flex; align-items: center; gap: 0.6rem; font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; }
.nav-logo .icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: #000; }
.nav-logo .dot { color: var(--accent); }
.nav-links { display: flex; gap: 2rem; }
.nav-links a { color: var(--muted); font-size: 0.875rem; font-weight: 500; transition: color 0.15s; }
.nav-links a:hover { color: var(--text); }

.wrap { max-width: 400px; margin: 0 auto; padding: 3.5rem 1.25rem 5rem; }
.eyebrow { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); margin-bottom: 0.75rem; }
h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem; }
.sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

.tabs { display: flex; gap: 0.4rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.3rem; margin-bottom: 1.5rem; }
.tabs button { flex: 1; background: transparent; border: 0; color: var(--muted); font-family: inherit; font-size: 0.85rem; font-weight: 600; padding: 0.6rem; border-radius: 7px; cursor: pointer; transition: 0.15s; }
.tabs button[aria-selected="true"] { background: var(--surface2); color: var(--text); }

form { display: none; }
form.active { display: block; }
label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; }
input {
width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
color: var(--text); font-family: inherit; font-size: 0.95rem; padding: 0.7rem 0.85rem; margin-bottom: 1rem;
}
input:focus { outline: none; border-color: var(--accent); }
button.primary {
width: 100%; background: var(--accent); color: #000; border: 0; border-radius: 8px;
font-family: inherit; font-size: 0.95rem; font-weight: 700; padding: 0.8rem; cursor: pointer;
}
button.primary:disabled { opacity: 0.55; cursor: default; }
.linkbtn { background: none; border: 0; color: var(--muted); font-family: inherit; font-size: 0.8rem; cursor: pointer; padding: 0; text-decoration: underline; }
.linkbtn:hover { color: var(--text); }
.row { margin-top: 1rem; text-align: center; }

.msg { border-radius: 8px; padding: 0.7rem 0.85rem; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
.msg.show { display: block; }
.msg.err { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.35); color: #ffb694; }
.msg.ok { background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.3); color: var(--accent); }

#loggedOut { display: none; }
#authLoading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 3rem 0; color: var(--muted); font-size: 0.875rem; }
#authLoading .spin { width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: lpspin 0.7s linear infinite; }
@keyframes lpspin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { #authLoading .spin { animation-duration: 2.4s; } }
.signed-in { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem 1.5rem; }
.signed-in.show { display: block; }
.signed-in h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
.signed-in .who { font-family: var(--mono); font-size: 0.85rem; color: var(--accent); word-break: break-all; margin-bottom: 1.5rem; }
.signed-in button { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 0.7rem; border-radius: 8px; cursor: pointer; }
.signed-in button:hover { color: var(--text); border-color: var(--muted); }

.note { font-size: 0.75rem; color: var(--muted); margin-top: 1.5rem; line-height: 1.5; }
.note a { color: var(--muted); text-decoration: underline; }

footer { border-top: 1px solid var(--border); padding: 1.75rem 2rem; text-align: center; }
footer p { font-size: 0.75rem; color: var(--muted); }
@media (max-width: 768px) { .nav-links { display: none; } nav { padding: 1rem 1.25rem; } }
</style>
</head>
<body>

<nav>
<a class="nav-logo" href="/">
<div class="icon">⊕</div>
<span>Loiter<span class="dot">Point</span></span>
</a>
<div class="nav-links">
<a href="/drones/">Drones</a>
<a href="/audio/">Audio</a>
<a href="/home-tech/">Home Tech</a>
<a href="/deals.html">Deals</a>
</div>
</nav>

<div class="wrap">
  <div class="eyebrow">// Account</div>

  <div id="authLoading"><span class="spin" aria-hidden="true"></span><span role="status">Checking your session…</span></div>

  <div id="loggedOut">
    <h1 id="headline">Welcome back.</h1>
    <p class="sub">Sign in to your Loiter Point account.</p>

    <div class="tabs" role="tablist">
      <button id="tabSignin" role="tab" aria-selected="true">Sign in</button>
      <button id="tabSignup" role="tab" aria-selected="false">Create account</button>
    </div>

    <div id="msg" class="msg"></div>

    <form id="formSignin" class="active" novalidate>
      <label for="siEmail">Email</label>
      <input id="siEmail" type="email" autocomplete="email" required>
      <label for="siPass">Password</label>
      <input id="siPass" type="password" autocomplete="current-password" required>
      <button class="primary" type="submit">Sign in</button>
      <div class="row"><button type="button" class="linkbtn" id="resetBtn">Forgot your password?</button></div>
    </form>

    <form id="formSignup" novalidate>
      <label for="suEmail">Email</label>
      <input id="suEmail" type="email" autocomplete="email" required>
      <label for="suPass">Password <span style="font-weight:400">(6+ characters)</span></label>
      <input id="suPass" type="password" autocomplete="new-password" minlength="6" required>
      <button class="primary" type="submit">Create account</button>
    </form>

    <p class="note">By creating an account you agree to our <a href="/terms.html">Terms</a> and <a href="/privacy-policy.html">Privacy Policy</a>.</p>
  </div>

  <div id="loggedIn" class="signed-in">
    <h2>You're signed in</h2>
    <div class="who" id="whoami"></div>
    <button id="signoutBtn">Sign out</button>
  </div>
</div>

<footer>
<p>© 2026 Loiter Point — Consumer tech reviews built on real evidence.</p>
</footer>

<script src="/nav.js" defer></script>
<script type="module">
/* Firebase loads from Google's CDN because this site has no bundler.
   The config below is NOT a secret — Firebase web keys are public by design.
   They identify the project; they don't authorize access. Access is controlled
   by the Authorized Domains list in the console. Never put a service-account
   key (Project settings -> Service accounts) in a file like this. */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyBK0BtlKD1ye06vqlZQbLC_oLepD_z9hS4",
  authDomain: "loiterpoint.firebaseapp.com",
  projectId: "loiterpoint",
  storageBucket: "loiterpoint.firebasestorage.app",
  messagingSenderId: "720833786375",
  appId: "1:720833786375:web:5a064020a9ccef596ab0a2",
  measurementId: "G-4B11NT8CR4"
});

const auth = getAuth(app);
const $ = (id) => document.getElementById(id);
const msg = $("msg");

/* Firebase error codes aren't user-facing English. Translate the common ones. */
function friendly(err) {
  switch ((err && err.code) || "") {
    case "auth/email-already-in-use": return "That email already has an account. Try signing in instead.";
    case "auth/invalid-email":        return "That doesn't look like a valid email address.";
    case "auth/weak-password":        return "Password is too weak — use at least 6 characters.";
    case "auth/missing-password":     return "Please enter a password.";
    // Firebase returns one code for wrong-password / no-such-user on purpose,
    // so the form can't be used to discover which emails are registered.
    case "auth/invalid-credential":
    case "auth/wrong-password":
    case "auth/user-not-found":       return "Email or password is incorrect.";
    case "auth/too-many-requests":    return "Too many attempts. Wait a few minutes and try again.";
    case "auth/network-request-failed": return "Network error — check your connection.";
    case "auth/unauthorized-domain":  return "This domain isn't authorized in the Firebase console yet.";
    default: return err && err.code ? "Something went wrong (" + err.code + ")." : "Something went wrong.";
  }
}

function say(text, kind) { msg.textContent = text; msg.className = "msg show " + kind; }
function clearMsg() { msg.className = "msg"; }

function selectTab(which) {
  const signin = which === "signin";
  $("tabSignin").setAttribute("aria-selected", String(signin));
  $("tabSignup").setAttribute("aria-selected", String(!signin));
  $("formSignin").classList.toggle("active", signin);
  $("formSignup").classList.toggle("active", !signin);
  $("headline").textContent = signin ? "Welcome back." : "Create your account.";
  clearMsg();
}
$("tabSignin").addEventListener("click", () => selectTab("signin"));
$("tabSignup").addEventListener("click", () => selectTab("signup"));

// Lets you link straight to the signup tab: /account.html?mode=signup
if (new URLSearchParams(location.search).get("mode") === "signup") selectTab("signup");

$("formSignup").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector("button.primary");
  btn.disabled = true; clearMsg();
  try {
    await createUserWithEmailAndPassword(auth, $("suEmail").value.trim(), $("suPass").value);
    // onAuthStateChanged swaps the view — no redirect needed.
  } catch (err) {
    say(friendly(err), "err");
  }
  btn.disabled = false;
});

$("formSignin").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector("button.primary");
  btn.disabled = true; clearMsg();
  try {
    await signInWithEmailAndPassword(auth, $("siEmail").value.trim(), $("siPass").value);
  } catch (err) {
    say(friendly(err), "err");
  }
  btn.disabled = false;
});

$("resetBtn").addEventListener("click", async () => {
  const email = $("siEmail").value.trim();
  if (!email) { say("Enter your email above first, then tap this again.", "err"); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    // Worded so it doesn't confirm whether the address has an account.
    say("If that address has an account, a reset link is on its way.", "ok");
  } catch (err) {
    say(friendly(err), "err");
  }
});

$("signoutBtn").addEventListener("click", () => signOut(auth));

/* Fires on load and on every sign-in / sign-out. Firebase persists the session
   in the browser, so a returning user lands here already signed in. */
let authResolved = false;

function showView(which) {
  authResolved = true;
  const loading = $("authLoading");
  if (loading) loading.style.display = "none";
  $("loggedOut").style.display = which === "out" ? "block" : "none";
  $("loggedIn").classList.toggle("show", which === "in");
}

/* If Firebase never answers — offline, CDN blocked, adblocker — don't strand
   the user on a spinner forever. Fall back to the sign-in form, which is the
   safe default: worst case a signed-in user signs in again. */
setTimeout(() => {
  if (!authResolved) {
    showView("out");
    say("Couldn't reach the sign-in service. Check your connection.", "err");
  }
}, 8000);

onAuthStateChanged(auth, (user) => {
  /* A plain localStorage flag so nav.js can tell whether to bother loading the
     Firebase SDK. We do NOT read Firebase's own persistence: it uses IndexedDB,
     the layout is internal, and probing it is both async and liable to change. */
  try {
    if (user) localStorage.setItem("lp_auth", "1");
    else localStorage.removeItem("lp_auth");
  } catch (e) { /* private mode; nav just won't show Sign out */ }

  if (user) {
    $("whoami").textContent = user.email;
    showView("in");
  } else {
    showView("out");
    $("formSignin").reset();
    $("formSignup").reset();
  }
});
</script>
</body></html>
